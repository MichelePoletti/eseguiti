<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Accesso — Unione contabili</title>
<style>
  :root{--bg:#0f1720;--card:#17212b;--line:#2a3947;--ink:#e7eef5;--muted:#9fb2c4;--accent:#3d9be9;--err:#e05c5c}
  @media (prefers-color-scheme:light){:root{--bg:#eef2f6;--card:#fff;--line:#d9e1ea;--ink:#16222e;--muted:#5a6b7b;--accent:#1f7fd0}}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;display:grid;place-items:center;font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  .box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:32px;width:min(90vw,380px);text-align:center}
  h1{font-size:1.15rem;margin:0 0 6px}
  p{color:var(--muted);font-size:.9rem;margin:0 0 20px}
  input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:12px 14px;font-size:1rem;text-align:center}
  input:focus{outline:none;border-color:var(--accent)}
  button{width:100%;margin-top:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px;font-size:1rem;font-weight:600;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  .err{color:var(--err);font-size:.88rem;min-height:1.3em;margin-top:12px}
  .lock{font-size:1.8rem;margin-bottom:8px}
  .ver{margin-top:16px;color:var(--muted);font-size:.72rem;opacity:.8}
</style>
</head>
<body>
  <form class="box" id="f">
    <div class="lock">🔒</div>
    <h1>Unione contabili</h1>
    <p>Strumento riservato. Inserisci la password per accedere.</p>
    <input id="pw" type="password" placeholder="Password" autocomplete="current-password" autofocus>
    <button id="go" type="submit">Entra</button>
    <div class="err" id="err"></div>

document.getElementById('f').addEventListener('submit', async e=>{
  e.preventDefault();
  const btn=document.getElementById('go'), err=document.getElementById('err');
  const pw=document.getElementById('pw').value;
  btn.disabled=true; err.textContent='Verifica…';
  try{
    const raw=b64(PKG);
    const salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);

    const html=new TextDecoder().decode(pt);
    const ifr=document.createElement('iframe');
    ifr.setAttribute('style','position:fixed;inset:0;width:100%;height:100%;border:0');
    ifr.srcdoc=html;
    document.body.innerHTML=''; document.body.appendChild(ifr);
  }catch(_){
    err.textContent='Password errata.';
    btn.disabled=false;
  }
